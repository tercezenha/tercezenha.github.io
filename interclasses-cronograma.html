<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Cronograma — Interclasses — Tercezenha 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

  <header id="site-header">
    <a class="header-logo" href="index.html">TERCEZENHA</a>
    <nav>
      <a href="trotes.html">Trotes</a>
      <a href="turma.html">Turma</a>
      <a href="interclasses.html">Interclasses</a>
    </nav>
  </header>

  <section class="page-hero">
    <a class="ic-back" href="interclasses.html">&larr; Interclasses</a>
    <span class="hero-eyebrow">Competição Interna</span>
    <h1 class="page-title">MEU CRONOGRAMA</h1>
  </section>

  <main class="page-content">
    <div class="ic-wrapper">

      <form class="cronograma-form" id="cronograma-form" novalidate>

        <div class="cronograma-field">
          <span class="form-label">Série</span>
          <div class="autocomplete-wrap">
            <input
              type="text"
              id="cronograma-grade-input"
              class="cronograma-input"
              placeholder="Digite sua série…"
              autocomplete="off"
              spellcheck="false"
            />
            <ul id="cronograma-grade-suggestions" class="cronograma-suggestions" role="listbox"></ul>
          </div>
        </div>

        <div class="cronograma-field">
          <span class="form-label">Seu nome</span>
          <div class="autocomplete-wrap">
            <input
              type="text"
              id="cronograma-name-input"
              class="cronograma-input"
              placeholder="Digite seu nome…"
              autocomplete="off"
              spellcheck="false"
            />
            <ul id="cronograma-suggestions" class="cronograma-suggestions" role="listbox"></ul>
          </div>
        </div>

        <button type="submit" class="cronograma-btn">Ver meu cronograma &rarr;</button>

      </form>

      <div id="cronograma-results"></div>

    </div>
  </main>

  <footer class="site-footer">
    <a href="index.html" class="footer-logo">TERCEZENHA</a>
    <nav>
      <a href="trotes.html">Trotes</a>
      <a href="turma.html">Turma</a>
      <a href="interclasses.html">Interclasses</a>
    </nav>
    <span class="footer-copy">Tercezenha &copy; 2026</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/lenis@1/dist/lenis.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/interclasses.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
